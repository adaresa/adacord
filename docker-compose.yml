services:
  yt-cipher:
    image: ghcr.io/kikkia/yt-cipher:master
    container_name: adacord-yt-cipher
    restart: unless-stopped
    environment:
      API_TOKEN: ${YOUTUBE_CIPHER_PASSWORD:-adacord-cipher}
    expose:
      - "8001"

  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4.2.2-alpine
    container_name: adacord-lavalink
    restart: unless-stopped
    environment:
      _JAVA_OPTIONS: "-Xmx512M"
      LAVALINK_PASSWORD: ${LAVALINK_PASSWORD:-youshallnotpass}
      YOUTUBE_OAUTH_ENABLED: ${YOUTUBE_OAUTH_ENABLED:-false}
      YOUTUBE_OAUTH_REFRESH_TOKEN: ${YOUTUBE_OAUTH_REFRESH_TOKEN:-}
      YOUTUBE_OAUTH_SKIP_INITIALIZATION: ${YOUTUBE_OAUTH_SKIP_INITIALIZATION:-true}
      YOUTUBE_CIPHER_PASSWORD: ${YOUTUBE_CIPHER_PASSWORD:-adacord-cipher}
    volumes:
      - ./lavalink/application.yml:/opt/Lavalink/application.yml:ro
    expose:
      - "2333"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider --header=\"Authorization: $${LAVALINK_PASSWORD:-youshallnotpass}\" http://127.0.0.1:2333/version || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
    depends_on:
      - yt-cipher

  bot:
    build: .
    env_file: .env
    environment:
      LAVALINK_URI: http://lavalink:2333
      LAVALINK_PASSWORD: ${LAVALINK_PASSWORD:-youshallnotpass}
    depends_on:
      lavalink:
        condition: service_healthy
    restart: unless-stopped
