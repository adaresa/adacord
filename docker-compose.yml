services:
  yt-cipher:
    image: ghcr.io/kikkia/yt-cipher:master
    container_name: adacord-yt-cipher
    restart: unless-stopped
    environment:
      API_TOKEN: adacord-internal-cipher
    expose:
      - "8001"

  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4.2.2-alpine
    container_name: adacord-lavalink
    restart: unless-stopped
    environment:
      _JAVA_OPTIONS: "-Xmx512M"
      YOUTUBE_OAUTH_ENABLED: ${YOUTUBE_OAUTH_ENABLED:-false}
      YOUTUBE_OAUTH_REFRESH_TOKEN: ${YOUTUBE_OAUTH_REFRESH_TOKEN:-}
      YOUTUBE_OAUTH_SKIP_INITIALIZATION: ${YOUTUBE_OAUTH_SKIP_INITIALIZATION:-true}
    volumes:
      - ./lavalink/application.yml:/opt/Lavalink/application.yml:ro
    expose:
      - "2333"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider --header=\"Authorization: adacord-internal-lavalink\" http://127.0.0.1:2333/version || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
    depends_on:
      - yt-cipher

  bot:
    image: ghcr.io/adaresa/adacord:latest
    env_file: .env
    volumes:
      - ./data:/app/data
    depends_on:
      lavalink:
        condition: service_healthy
    restart: unless-stopped
